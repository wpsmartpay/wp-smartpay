name: Plugin Check (PCP)

on:
  pull_request:
  push:
    branches: [main, develop]

jobs:
  plugin-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: '.'
          categories: |
            plugin_repo
            security
            performance
            accessibility
